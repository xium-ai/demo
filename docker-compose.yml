services:

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1: INFRASTRUKTUR (profile: infra)
  # ═══════════════════════════════════════════════════════════════════════════

  vault:
    profiles: [infra, app]
    image: openbao/openbao:2.2.0
    container_name: xos-vault
    command: server -dev -dev-root-token-id=xos-dev-root-token
    environment:
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgresql:
    profiles: [infra, app]
    image: postgres:17-alpine
    container_name: xos-postgresql
    environment:
      POSTGRES_DB:       xium
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: xos-pg-bootstrap
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./setup-job/initdb.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    profiles: [infra, app]
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: xos-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: xos-kc-bootstrap
      KC_DB:              postgres
      KC_DB_URL:          jdbc:postgresql://postgresql:5432/keycloak
      KC_DB_USERNAME:     postgres
      KC_DB_PASSWORD:     xos-pg-bootstrap
      KC_HTTP_ENABLED:    "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY:           edge
      KC_HEALTH_ENABLED:  "true"
      JAVA_OPTS_APPEND:   "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy

  etcd:
    profiles: [infra, app]
    image: gcr.io/etcd-development/etcd:v3.6.8
    container_name: xos-etcd
    command:
      - /usr/local/bin/etcd
      - --name=default
      - --data-dir=/var/lib/etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=default=http://0.0.0.0:2380
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/var/lib/etcd
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2: ANWENDUNG (profile: app)
  # ═══════════════════════════════════════════════════════════════════════════

  memgraph:
    profiles: [app]
    image: memgraph/memgraph:latest
    container_name: xos-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host localhost --port 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  memgraph-lab:
    profiles: [app]
    image: memgraph/lab:latest
    container_name: xos-memgraph-lab
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: "7687"
    ports:
      - "3000:3000"
    depends_on:
      - memgraph

  minio:
    profiles: [app]
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: xos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     xos-minio
      MINIO_ROOT_PASSWORD: xos-minio-bootstrap
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    profiles: [app]
    image: redis:7.4-alpine
    container_name: xos-redis
    command: redis-server --save "" --loglevel warning
    ports:
      - "6379:6379"

  livekit:
    profiles: [app]
    image: livekit/livekit-server:latest
    container_name: xos-livekit
    command: --dev
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"
    ports:
      - "7880:7880"

  xosp:
    profiles: [app]
    image: ghcr.io/xium-ai/xosp:latest
    platform: linux/amd64
    container_name: xos-xosp
    environment:
      XOSP_SERVER_ADDR:    ":9100"
      XOSP_VAULT_URL:      "http://vault:8200"
      XOSP_VAULT_TOKEN:    "xos-dev-root-token"
      XOSP_ETCD_ENDPOINTS: "etcd:2379"
    ports:
      - "9100:9100"
    depends_on:
      memgraph:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      vault:
        condition: service_healthy
      etcd:
        condition: service_healthy
      keycloak:
        condition: service_started

  setup:
    profiles: [app]
    build:
      context: ./setup-job
      dockerfile: Dockerfile
    container_name: xos-setup
    restart: "no"
    environment:
      XOS_NAMESPACE:      xos-dev
      XOS_NIP_BASE:       127.0.0.1.nip.io
      XOS_MINIO_USER:     xos-minio
      XOS_KEYCLOAK_ADMIN: admin
      XOS_PG_PASS:        xos-pg-bootstrap
      XOS_MINIO_PASS:     xos-minio-bootstrap
      XOS_KEYCLOAK_PASS:  xos-kc-bootstrap
      XOS_MEMGRAPH_PASS:  xos-memgraph-bootstrap
      XOS_VAULT_URL:      http://vault:8200
      XOS_MINIO_URL:      http://minio:9000
      XOS_KEYCLOAK_URL:   http://keycloak:8080
      XOS_ETCD_HOST:      etcd
      XOS_ETCD_PORT:      "2379"
      XOS_PG_HOST:        postgresql
      XOS_MEMGRAPH_HOST:  memgraph
      XOS_XOSP_URL:       https://localhost:9100
    depends_on:
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
      postgresql:
        condition: service_healthy
      etcd:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  memgraph_data:
  etcd_data:
