<div class="flex min-h-screen items-center justify-center p-4">
    <fieldset
        single="@note.detail"
        class="fieldset bg-base-200 border border-base-300 rounded-box p-6 w-full max-w-lg"
    >
        <legend
            class="fieldset-legend text-xs font-semibold text-base-content/50 uppercase tracking-widest"
        >
            Notiz
        </legend>

        <!-- ID -->
        <div class="mt-2 mb-1">
            <label class="label text-xs text-base-content/50 uppercase tracking-wider pb-1">ID</label>
            <input class="input input-bordered bg-base-300 w-full font-mono text-base-content/60" type="text" field="id" readonly />
        </div>

        <!-- Datum -->
        <div class="mt-2 mb-3">
            <label class="label text-xs text-base-content/50 uppercase tracking-wider pb-1">Datum</label>
            <input class="input input-bordered bg-base-300 w-full font-mono text-base-content/60" type="text" field="created_at" readonly />
        </div>

        <div class="divider text-xs text-base-content/40 uppercase tracking-widest">Inhalt</div>

        <!-- Titel -->
        <div class="mt-2">
            <label class="label text-xs text-base-content/50 uppercase tracking-wider pb-1">Titel</label>
            <input class="input input-bordered bg-base-100 w-full font-medium" type="text" field="title" />
        </div>

        <!-- Body -->
        <div class="mt-4">
            <label class="label text-xs text-base-content/50 uppercase tracking-wider pb-1">Notiz</label>
            <textarea
                class="textarea textarea-bordered bg-base-100 w-full h-36 leading-relaxed"
                field="body"
            ></textarea>
        </div>

    </fieldset>
</div>
