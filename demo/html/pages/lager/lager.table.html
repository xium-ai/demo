<div
    class="overflow-y-auto overflow-x-auto h-[calc(100vh-120px)] border border-base-300 rounded-box shadow-lg"
>
    <table class="table w-full border-separate border-spacing-0">
        <thead bind="#lager" class="bg-base-200 sticky top-0 z-10">
            <tr class="shadow-sm">
                <th class="bg-base-200" field="id">#</th>
                <th class="bg-base-200" field="name">Artikel</th>
                <th class="bg-base-200" field="lager">Lager</th>
                <th class="bg-base-200 text-right" style="text-align: right" field="menge">Menge</th>
                <th class="bg-base-200" field="einheit">Einheit</th>
                <th class="bg-base-200 text-right" style="text-align: right" field="preis">Preis</th>
            </tr>
        </thead>
        <tbody>
            <tr
                loop="@lager"
                data-id="id"
                class="hover:bg-base-200 transition-colors cursor-pointer"
            >
                <td field="id"></td>
                <td style="font-weight: bold" field="name"></td>
                <td field="lager"></td>
                <td style="text-align: right" field="menge"></td>
                <td field="einheit"></td>
                <td style="text-align: right" field="preis"></td>
            </tr>
        </tbody>
        <tfoot class="bg-base-100 font-bold">
            <tr>
                <td>Gesamt</td>
                <td></td>
                <td></td>
                <td style="text-align: right" field="!sum:menge"></td>
                <td></td>
                <td style="text-align: right" field="!sum:preis"></td>
            </tr>
        </tfoot>
    </table>
</div>
