<div
    class="overflow-y-auto overflow-x-auto h-[calc(100vh-120px)] border border-base-300 rounded-box shadow-lg"
>
    <table class="table w-full border-separate border-spacing-0">
        <thead bind="#person" class="bg-base-200 sticky top-0 z-10">
            <tr class="shadow-sm">
                <th class="bg-base-200" field="id">#</th>
                <th class="bg-base-200" field="firstname">Vorname</th>
                <th class="bg-base-200" field="lastname">Nachname</th>
                <th class="bg-base-200" field="age">Alter</th>
                <th
                    class="bg-base-200 text-right"
                    style="text-align: right"
                    field="net_worth"
                >
                    Vermögen
                </th>
            </tr>
        </thead>
        <tbody>
            <tr
                loop="@person"
                data-id="id"
                class="hover:bg-base-200 transition-colors cursor-pointer"
            >
                <td field="id"></td>
                <td style="font-weight: bold" field="firstname"></td>
                <td field="lastname"></td>
                <td field="age"></td>
                <td style="text-align: right" field="net_worth"></td>
            </tr>
        </tbody>
        <tfoot class="bg-base-100 font-bold">
            <tr>
                <td>Gesamt</td>
                <td></td>
                <td></td>
                <td></td>
                <td style="text-align: right" field="!sum:net_worth"></td>
            </tr>
            <tr class="text-base-content/60">
                <td>Durchschnitt</td>
                <td></td>
                <td></td>
                <td></td>
                <td style="text-align: right" field="!avg:net_worth"></td>
            </tr>
        </tfoot>
    </table>
    <div class="overflow-x-auto"></div>
</div>
